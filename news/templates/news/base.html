<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}NewsDebate{% endblock %}</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    {% load static %}
    <link rel="stylesheet" href="{% static 'news/css/style.css' %}">
    
    {% block extra_head %}{% endblock %}
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">
    
    <!-- Header -->
    {% include 'news/partials/header.html' %}
    
    <!-- Main Content -->
    <main class="flex-grow">
        <div class="container mx-auto px-4 py-8">
            {% block content %}{% endblock %}
        </div>
    </main>
    
    <!-- Footer -->
    {% include 'news/partials/footer.html' %}
    
    <!-- Core JavaScript -->
    <script src="{% static 'news/js/auth.js' %}"></script>
    <script src="{% static 'news/js/main.js' %}"></script>
    <script src="{% static 'news/js/news-grid.js' %}"></script>
    
    <!-- ✅ ADD THIS SECTION HERE -->
    <script>
        // Listen for auth changes (login/logout/premium update)
        window.addEventListener('auth-change', function() {
            console.log('🔄 Auth state changed, refreshing UI...');
            
            // Refresh stats if stats function exists (home page)
            if (typeof loadStats === 'function') {
                loadStats();
            }
            
            // Refresh ads if ad function exists (article page)
            if (typeof loadAd === 'function') {
                loadAd();
            }
            
            // Refresh upvote status if on article page
            if (typeof loadUpvoteStatus === 'function') {
                loadUpvoteStatus();
            }
            
            // Refresh comments if on article page
            if (typeof loadComments === 'function') {
                loadComments();
            }
        });
    </script>
    
    {% block extra_js %}{% endblock %}
</body>
</html>
