<header class="bg-white shadow-lg sticky top-0 z-50">
    <nav class="container mx-auto px-4">
        <div class="flex justify-between items-center py-4">
            <!-- Logo -->
            <a href="/" class="flex items-center space-x-2">
                <span class="text-3xl">📰</span>
                <span class="text-2xl font-bold text-gray-800">
                    News<span class="text-blue-600">Debate</span>
                </span>
            </a>
            
            <!-- Desktop Navigation -->
            <div class="hidden md:flex items-center space-x-8">
                <a href="/" class="nav-link hover:text-blue-600 transition">Home</a>
                <a href="/api/docs/" class="nav-link hover:text-blue-600 transition" target="_blank">API</a>
                
                <!-- Dynamic Auth Section -->
                <div id="auth-section" class="flex items-center space-x-4">
                    <!-- Will be populated by JavaScript -->
                </div>
            </div>
            
            <!-- Mobile Menu Button -->
            <button id="mobile-menu-button" class="md:hidden text-gray-700 hover:text-blue-600">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                </svg>
            </button>
        </div>
        
        <!-- Mobile Menu -->
        <div id="mobile-menu" class="hidden md:hidden pb-4">
            <div class="flex flex-col space-y-2">
                <a href="/" class="mobile-nav-link">Home</a>
                <a href="/api/docs/" class="mobile-nav-link" target="_blank">API</a>
                <div id="mobile-auth-section" class="flex flex-col space-y-2 pt-2 border-t">
                    <!-- Will be populated by JavaScript -->
                </div>
            </div>
        </div>
    </nav>
</header>

<!-- Add auth.js before using it -->
<script src="{% static 'news/js/auth.js' %}"></script>
<script>
    // Function to update navbar based on auth state
    function updateNavbar() {
        const authSection = document.getElementById('auth-section');
        const mobileAuthSection = document.getElementById('mobile-auth-section');
        
        if (!authSection || !mobileAuthSection) return;
        
        if (Auth.isAuthenticated()) {
            const userName = Auth.getUserDisplayName();
            const user = Auth.getUser();
            const isPremium = user?.is_premium_active || false;
            
            // Desktop view
            authSection.innerHTML = `
                <span class="text-gray-700">Welcome, <span class="font-semibold">${userName}</span></span>
                ${!isPremium ? '<a href="/payments/premium/" class="bg-yellow-500 text-white px-3 py-2 rounded-lg hover:bg-yellow-600 text-sm">Upgrade</a>' : '<span class="text-yellow-600 font-semibold">⭐ Premium</span>'}
                <button onclick="handleLogout()" class="bg-red-500 text-white px-4 py-2 rounded-lg hover:bg-red-600 transition text-sm">
                    Logout
                </button>
            `;
            
            // Mobile view
            mobileAuthSection.innerHTML = `
                <span class="text-gray-700 py-2">Welcome, ${userName}</span>
                <div class="flex flex-col space-y-2">
                    ${!isPremium ? '<a href="/payments/premium/" class="bg-yellow-500 text-white px-4 py-2 rounded-lg hover:bg-yellow-600 text-center">Upgrade</a>' : '<span class="text-yellow-600 py-2 text-center">⭐ Premium</span>'}
                    <button onclick="handleLogout()" class="bg-red-500 text-white px-4 py-2 rounded-lg hover:bg-red-600 transition">
                        Logout
                    </button>
                </div>
            `;
        } else {
            // Not logged in
            authSection.innerHTML = `
                <a href="/api/auth/login/" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition text-sm">
                    Login
                </a>
            `;
            
            mobileAuthSection.innerHTML = `
                <a href="/api/auth/login/" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition text-center">
                    Login
                </a>
            `;
        }
    }

    // Handle logout
    async function handleLogout() {
        await Auth.logout();
        updateNavbar();
        
        alert('Logged out successfully!');
        window.location.href = '/';
    }

    // Update navbar on page load
    document.addEventListener('DOMContentLoaded', function() {
        updateNavbar();
        
        // Mobile menu toggle
        const menuButton = document.getElementById('mobile-menu-button');
        const mobileMenu = document.getElementById('mobile-menu');
        
        if (menuButton && mobileMenu) {
            menuButton.addEventListener('click', () => {
                mobileMenu.classList.toggle('hidden');
            });
        }
    });

    // Update navbar when auth state changes
    window.addEventListener('auth-change', updateNavbar);
</script>

<style>
    .nav-link {
        @apply text-gray-700 hover:text-blue-600 transition font-medium;
    }
    .mobile-nav-link {
        @apply block py-2 px-4 text-gray-700 hover:bg-gray-100 hover:text-blue-600 rounded transition;
    }
</style>
